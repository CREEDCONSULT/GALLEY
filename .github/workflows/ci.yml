name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Domain invariants (mock validation node)
        run: npm run validate:galley

      - name: Verifier rules contract
        run: npm run validate:galley:verifier

      - name: Production build
        run: npm run build
        env:
          # Placeholder only — the build compiles against this but never connects.
          NEXT_PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
